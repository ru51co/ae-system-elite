<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AE SYSTEM | ELITE ORDER</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Syne:wght@700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:     #050508;
      --bg2:    #0a0a14;
      --bg3:    #0f0f1e;
      --accent: #00ccff;
      --accent2:#ff3cac;
      --glow:   rgba(0,204,255,.35);
      --glow2:  rgba(255,60,172,.25);
      --border: rgba(0,204,255,.15);
      --text:   #c8d8e8;
      --muted:  #3a4a5a;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: #fff;
      font-family: 'Syne', sans-serif;
      overflow-x: hidden;
      min-height: 100vh;
    }

    /* ── Scanline overlay ── */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background: repeating-linear-gradient(
        0deg, transparent, transparent 2px,
        rgba(0,0,0,.06) 2px, rgba(0,0,0,.06) 4px
      );
      pointer-events: none;
      z-index: 9999;
    }

    /* ──────── AUTH ──────── */
    #auth-overlay {
      position: fixed; inset: 0;
      background: var(--bg);
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity .6s ease;
    }
    #auth-overlay.hide { opacity: 0; pointer-events: none; }

    .auth-card {
      width: 90%; max-width: 360px;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 36px 28px;
      text-align: center;
      box-shadow: 0 0 60px var(--glow);
      animation: fadeUp .6s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* AE SVG logo in auth */
    .auth-logo-svg {
      display: flex;
      justify-content: center;
      margin-bottom: 10px;
    }

    .auth-sub {
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 3px;
      margin-bottom: 28px;
    }

    .auth-input {
      width: 100%; padding: 13px 16px; margin-bottom: 10px;
      background: rgba(0,204,255,.04);
      border: 1px solid var(--border);
      color: #fff; border-radius: 10px; outline: none;
      font-family: 'Space Mono', monospace; font-size: 13px;
      transition: border-color .2s, box-shadow .2s;
    }
    .auth-input:focus { border-color: var(--accent); box-shadow: 0 0 12px var(--glow); }
    .auth-input::placeholder { color: var(--muted); }

    .auth-btn {
      width: 100%; padding: 14px;
      background: var(--accent); border: none; border-radius: 11px;
      font-family: 'Syne', sans-serif; font-weight: 900;
      font-size: 14px; letter-spacing: 2px;
      cursor: pointer; color: #000; margin-top: 4px;
      transition: box-shadow .2s, transform .1s;
    }
    .auth-btn:hover { box-shadow: 0 0 24px var(--glow); }
    .auth-btn:active { transform: scale(.98); }
    .auth-btn:disabled { opacity: .5; cursor: not-allowed; }

    .auth-error {
      font-size: 11px; font-family: 'Space Mono', monospace;
      margin-top: 14px; min-height: 16px; color: var(--accent);
    }
    .auth-error.err { color: var(--accent2); }

    .auth-toggle {
      font-size: 10px; color: var(--muted); margin-top: 18px;
      cursor: pointer; font-family: 'Space Mono', monospace;
      letter-spacing: 1px; transition: color .2s;
    }
    .auth-toggle:hover { color: var(--accent); }

    /* ──────── MAIN APP ──────── */
    #app { display: none; }
    #app.visible { display: block; }

    /* Topbar */
    .topbar {
      position: sticky; top: 0;
      background: rgba(5,5,8,.9);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center;
      justify-content: space-between;
      padding: 10px 20px; z-index: 100; gap: 12px;
    }
    .topbar-logo {
      display: flex; align-items: center; gap: 10px;
      font-size: 14px; font-weight: 900;
      letter-spacing: 2px; color: var(--accent);
    }
    .topbar-user {
      font-family: 'Space Mono', monospace; font-size: 11px;
      color: var(--text); display: flex; align-items: center; gap: 10px;
    }
    .logout-btn {
      background: none; border: 1px solid var(--border);
      color: var(--muted); padding: 5px 12px; border-radius: 8px;
      font-family: 'Space Mono', monospace; font-size: 10px;
      cursor: pointer; letter-spacing: 1px; transition: all .2s;
    }
    .logout-btn:hover { border-color: var(--accent2); color: var(--accent2); }

    /* Tabs */
    .tabs {
      display: flex; gap: 4px;
      padding: 16px 20px 0;
      border-bottom: 1px solid var(--border);
      overflow-x: auto;
    }
    .tab {
      padding: 10px 18px; font-size: 11px;
      font-family: 'Space Mono', monospace; letter-spacing: 2px;
      color: var(--muted); cursor: pointer;
      border-radius: 8px 8px 0 0;
      border: 1px solid transparent; border-bottom: none;
      white-space: nowrap; transition: all .2s;
    }
    .tab:hover { color: var(--text); }
    .tab.active { color: var(--accent); border-color: var(--border); background: var(--bg2); }

    /* Panels */
    .panel { display: none; padding: 24px 20px; }
    .panel.active { display: block; animation: fadeUp .4s ease both; }

    /* Stat grid */
    .stat-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 14px; margin-bottom: 24px;
    }
    .stat-card {
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: 14px; padding: 18px 16px; text-align: center;
      position: relative; overflow: hidden;
    }
    .stat-card::before {
      content: ''; position: absolute; top: 0; left: 0;
      width: 100%; height: 2px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
    }
    .stat-label {
      font-family: 'Space Mono', monospace; font-size: 9px;
      letter-spacing: 2px; color: var(--muted); margin-bottom: 8px;
    }
    .stat-value {
      font-size: 28px; font-weight: 900;
      color: var(--accent); text-shadow: 0 0 16px var(--glow);
    }
    .stat-value.pink { color: var(--accent2); text-shadow: 0 0 16px var(--glow2); }

    /* XP bar */
    .xp-section { margin-bottom: 24px; }
    .xp-header {
      display: flex; justify-content: space-between;
      align-items: center; margin-bottom: 8px;
    }
    .xp-label { font-family: 'Space Mono', monospace; font-size: 10px; color: var(--muted); letter-spacing: 2px; }
    .xp-bar-bg { height: 6px; background: rgba(0,204,255,.1); border-radius: 3px; overflow: hidden; }
    .xp-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      border-radius: 3px; transition: width 1s ease;
    }

    /* Level up flash */
    @keyframes levelFlash {
      0%   { box-shadow: 0 0 0 0 var(--glow); }
      50%  { box-shadow: 0 0 40px 10px var(--glow); }
      100% { box-shadow: 0 0 0 0 var(--glow); }
    }
    .level-up { animation: levelFlash 1s ease; }

    /* Form */
    .form-section {
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: 16px; padding: 22px; margin-bottom: 20px;
    }
    .form-title {
      font-size: 12px; font-family: 'Space Mono', monospace;
      letter-spacing: 2px; color: var(--accent); margin-bottom: 16px;
    }
    .form-row { display: flex; gap: 10px; flex-wrap: wrap; }
    .form-group { flex: 1; min-width: 120px; }
    .form-label {
      font-family: 'Space Mono', monospace; font-size: 9px;
      letter-spacing: 2px; color: var(--muted); display: block; margin-bottom: 6px;
    }
    .form-input {
      width: 100%; padding: 11px 14px;
      background: rgba(0,204,255,.04); border: 1px solid var(--border);
      border-radius: 10px; color: #fff;
      font-family: 'Space Mono', monospace; font-size: 13px;
      outline: none; transition: border-color .2s, box-shadow .2s;
    }
    .form-input:focus { border-color: var(--accent); box-shadow: 0 0 10px var(--glow); }

    .action-btn {
      padding: 12px 24px; background: var(--accent); border: none;
      border-radius: 10px; font-family: 'Syne', sans-serif;
      font-weight: 900; font-size: 12px; letter-spacing: 2px;
      cursor: pointer; color: #000; margin-top: 14px;
      transition: box-shadow .2s, transform .1s;
    }
    .action-btn:hover { box-shadow: 0 0 20px var(--glow); }
    .action-btn:active { transform: scale(.98); }
    .action-btn:disabled { opacity: .5; cursor: not-allowed; }

    /* History */
    .history-list { display: flex; flex-direction: column; gap: 10px; }
    .history-item {
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: 12px; padding: 14px 18px;
      display: flex; justify-content: space-between; align-items: center;
      animation: fadeUp .3s ease both;
    }
    .history-meta {
      font-family: 'Space Mono', monospace; font-size: 9px;
      color: var(--muted); margin-top: 4px;
    }
    .history-xp { font-size: 13px; font-weight: 700; color: var(--accent); }

    /* Leaderboard */
    .leaderboard { display: flex; flex-direction: column; gap: 8px; }
    .lb-item {
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: 12px; padding: 14px 18px;
      display: flex; align-items: center; gap: 16px;
      animation: fadeUp .3s ease both;
    }
    .lb-rank { font-size: 18px; font-weight: 900; color: var(--muted); min-width: 28px; }
    .lb-rank.gold   { color: #ffd700; text-shadow: 0 0 12px #ffd70055; }
    .lb-rank.silver { color: #c0c0c0; }
    .lb-rank.bronze { color: #cd7f32; }
    .lb-name { flex: 1; font-weight: 700; }
    .lb-xp { font-family: 'Space Mono', monospace; font-size: 11px; color: var(--accent); }
    .lb-me { border-color: rgba(0,204,255,.5); }

    /* Empty state */
    .empty-state {
      color: var(--muted); font-family: 'Space Mono', monospace;
      font-size: 11px; padding: 20px 0; text-align: center;
    }

    /* Toast */
    #toast {
      position: fixed; bottom: 24px; right: 24px;
      background: var(--bg2); border: 1px solid var(--accent);
      border-radius: 12px; padding: 14px 20px;
      font-family: 'Space Mono', monospace; font-size: 12px;
      color: var(--accent); box-shadow: 0 0 24px var(--glow);
      z-index: 9998; transform: translateY(80px); opacity: 0;
      transition: all .4s cubic-bezier(.175,.885,.32,1.275);
      max-width: 300px;
    }
    #toast.show { transform: translateY(0); opacity: 1; }
    #toast.error { border-color: var(--accent2); color: var(--accent2); box-shadow: 0 0 24px var(--glow2); }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  </style>
</head>
<body>

<!-- ════════ INLINE SVG LOGO (reusable) ════════ -->
<svg style="display:none">
  <symbol id="ae-logo" viewBox="0 0 60 60">
    <defs>
      <linearGradient id="lg1" x1="0" y1="0" x2="0" y2="1">

      </linearGradient>

    <!-- bg box -->
    <rect x="2" y="2" width="56" height="56" rx="10" fill="#050508"/>

    <!-- corners -->
    <polyline points="2,10 2,2 10,2"   stroke="#00ccff" stroke-width="1.5" fill="none"/>

<!-- ════════ AUTH ════════ -->
<div id="auth-overlay">
  <div class="auth-card">
    <div class="auth-logo-svg">
      <svg width="64" height="64" style="filter:drop-shadow(0 0 14px #00ccff88)">
        <use href="#ae-logo"/>
      </svg>
    </div>
    <div class="auth-sub">ELITE ORDER // SYSTEM v2.0</div>
    <input class="auth-input" id="user-in" placeholder="IDENTIFIER" autocomplete="username">
    <input class="auth-input" id="pass-in" type="password" placeholder="PASSKEY" autocomplete="current-password">
    <button class="auth-btn" id="auth-btn-el" onclick="handleAuth()">ENTER SYSTEM</button>
    <div class="auth-error" id="auth-error"></div>
    <div class="auth-toggle" id="mode-toggle" onclick="toggleMode()">
      → Нет аккаунта? Создать агента
    </div>
  </div>
</div>

<!-- ════════ APP ════════ -->
<div id="app">
  <div class="topbar">
    <div class="topbar-logo">
      <svg width="32" height="32" style="filter:drop-shadow(0 0 8px #00ccff66)">
        <use href="#ae-logo"/>
      </svg>
      AE SYSTEM
    </div>
    <div class="topbar-user">
      <span id="topbar-name">AGENT</span>
      <span id="topbar-lvl" style="color:var(--accent); font-size:10px;">LVL 1</span>
      <button class="logout-btn" onclick="logout()">LOGOUT</button>
    </div>
  </div>

  <div class="tabs">
    <div class="tab active" onclick="switchTab('dashboard', this)">DASHBOARD</div>
    <div class="tab" onclick="switchTab('workout', this)">ТРЕНИРОВКА</div>
    <div class="tab" onclick="switchTab('history', this)">ИСТОРИЯ</div>
    <div class="tab" onclick="switchTab('leaderboard', this)">РЕЙТИНГ</div>
  </div>

  <!-- DASHBOARD -->
  <div class="panel active" id="panel-dashboard">
    <div class="stat-grid">
      <div class="stat-card">
        <div class="stat-label">$AE BALANCE</div>
        <div class="stat-value" id="s-balance">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">LEVEL</div>
        <div class="stat-value pink" id="s-lvl">1</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">TOTAL REPS</div>
        <div class="stat-value" id="s-reps">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">KCAL BURNED</div>
        <div class="stat-value pink" id="s-kcal">0</div>
      </div>
    </div>
    <div class="xp-section">
      <div class="xp-header">
        <span class="xp-label">XP PROGRESS</span>
        <span class="xp-label" id="xp-label">0 / 1000 XP</span>
      </div>
      <div class="xp-bar-bg">
        <div class="xp-bar-fill" id="xp-bar" style="width:0%"></div>
      </div>
    </div>
  </div>

  <!-- WORKOUT -->
  <div class="panel" id="panel-workout">
    <div class="form-section">
      <div class="form-title">// LOG_WORKOUT</div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">REPS</label>
          <input class="form-input" id="w-reps" type="number" min="1" max="10000" placeholder="50">
        </div>
        <div class="form-group">
          <label class="form-label">KCAL</label>
          <input class="form-input" id="w-kcal" type="number" min="0" step="0.1" placeholder="25.0">
        </div>
      </div>
      <div class="form-group" style="margin-top:10px;">
        <label class="form-label">NOTE (OPTIONAL)</label>
        <input class="form-input" id="w-note" placeholder="Push-ups, 3 sets" maxlength="200">
      </div>
      <button class="action-btn" id="log-btn" onclick="logWorkout()">SUBMIT WORKOUT</button>
    </div>
  </div>

  <!-- HISTORY -->
  <div class="panel" id="panel-history">
    <div class="form-title" style="font-family:'Space Mono'; font-size:11px; letter-spacing:2px; color:var(--accent); margin-bottom:16px;">// WORKOUT_HISTORY</div>
    <div class="history-list" id="history-list">
      <div class="empty-state">Загрузка...</div>
    </div>
  </div>

  <!-- LEADERBOARD -->
  <div class="panel" id="panel-leaderboard">
    <div class="form-title" style="font-family:'Space Mono'; font-size:11px; letter-spacing:2px; color:var(--accent); margin-bottom:16px;">// ELITE_RANKING</div>
    <div class="leaderboard" id="leaderboard-list">
      <div class="empty-state">Загрузка...</div>
    </div>
  </div>
</div>

<!-- TOAST -->
<div id="toast"></div>

<script>
// ──────────────────────────────────────────
//  STATE
// ──────────────────────────────────────────
let isReg = false;
let session = { token: null, data: null };

// ──────────────────────────────────────────
//  HELPERS
// ──────────────────────────────────────────
function toast(msg, isError = false) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'show' + (isError ? ' error' : '');
  clearTimeout(el._t);
  el._t = setTimeout(() => el.className = '', 3200);
}

function setAuthError(msg, isErr = true) {
  const el = document.getElementById('auth-error');
  el.textContent = msg;
  el.className = 'auth-error' + (isErr ? ' err' : '');
}

function apiFd(obj) {
  const fd = new FormData();
  Object.entries(obj).forEach(([k, v]) => fd.append(k, v));
  return fd;
}

// ──────────────────────────────────────────
//  AUTH
// ──────────────────────────────────────────
function toggleMode() {
  isReg = !isReg;
  document.getElementById('auth-btn-el').textContent = isReg ? 'CREATE AGENT' : 'ENTER SYSTEM';
  document.getElementById('mode-toggle').textContent = isReg
    ? '← Уже есть аккаунт? Войти'
    : '→ Нет аккаунта? Создать агента';
  setAuthError('');
}

async function handleAuth() {
  const u = document.getElementById('user-in').value.trim();
  const p = document.getElementById('pass-in').value;
  if (!u || !p) { setAuthError('Заполните все поля'); return; }

  const btn = document.getElementById('auth-btn-el');
  btn.disabled = true;
  setAuthError('...', false);

  try {
    const r = await fetch(isReg ? '/api/register' : '/api/login', {
      method: 'POST',
      body: apiFd({ username: u, password: p })
    });
    const data = await r.json();

    if (r.ok) {
      if (isReg) {
        setAuthError('Агент создан! Теперь войдите.', false);
        toggleMode();
      } else {
        setAuthError('Доступ разрешён...', false);
        session.token = data.token;
        session.data  = data.data;
        setTimeout(enterApp, 700);
      }
    } else {
      setAuthError(data.detail || 'Ошибка доступа');
    }
  } catch {
    setAuthError('Ошибка связи с сервером');
  } finally {
    btn.disabled = false;
  }
}

// Enter key support
document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !document.getElementById('auth-overlay').classList.contains('hide')) {
    handleAuth();
  }
});

function enterApp() {
  const overlay = document.getElementById('auth-overlay');
  overlay.classList.add('hide');
  setTimeout(() => overlay.style.display = 'none', 600);
  document.getElementById('app').classList.add('visible');
  renderDashboard();
}

async function logout() {
  if (session.token) {
    try { await fetch('/api/logout', { method: 'POST', body: apiFd({ token: session.token }) }); } catch {}
  }
  session = { token: null, data: null };
  const app = document.getElementById('app');
  app.classList.remove('visible');
  const overlay = document.getElementById('auth-overlay');
  overlay.style.display = 'flex';
  requestAnimationFrame(() => {
    overlay.style.opacity = '1';
    overlay.classList.remove('hide');
  });
  document.getElementById('auth-error').textContent = '';
  document.getElementById('user-in').value = '';
  document.getElementById('pass-in').value = '';
  isReg = false;
  document.getElementById('auth-btn-el').textContent = 'ENTER SYSTEM';
  document.getElementById('mode-toggle').textContent = '→ Нет аккаунта? Создать агента';
}

// ──────────────────────────────────────────
//  TABS
// ──────────────────────────────────────────
function switchTab(name, el) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('panel-' + name).classList.add('active');
  if (name === 'history')     loadHistory();
  if (name === 'leaderboard') loadLeaderboard();
}

// ──────────────────────────────────────────
//  DASHBOARD
// ──────────────────────────────────────────
function renderDashboard() {
  const d = session.data;
  if (!d) return;

  document.getElementById('topbar-name').textContent = d.username.toUpperCase();
  document.getElementById('topbar-lvl').textContent  = 'LVL ' + d.lvl;
  document.getElementById('s-balance').textContent   = d.balance.toFixed(2);
  document.getElementById('s-lvl').textContent       = d.lvl;
  document.getElementById('s-reps').textContent      = d.reps;
  document.getElementById('s-kcal').textContent      = d.kcal.toFixed(1);

  const xpInLevel = d.xp % 1000;
  const xpToNext  = 1000;
  const pct = Math.min(100, (xpInLevel / xpToNext) * 100);
  document.getElementById('xp-bar').style.width   = pct + '%';
  document.getElementById('xp-label').textContent = `${xpInLevel} / ${xpToNext} XP  ·  LVL ${d.lvl}`;
}

async function refreshMe() {
  try {
    const r = await fetch('/api/me?token=' + session.token);
    if (r.ok) {
      session.data = await r.json();
      renderDashboard();
    }
  } catch {}
}

// ──────────────────────────────────────────
//  WORKOUT
// ──────────────────────────────────────────
async function logWorkout() {
  const reps = parseInt(document.getElementById('w-reps').value);
  const kcal = parseFloat(document.getElementById('w-kcal').value);
  const note = document.getElementById('w-note').value;

  if (!reps || reps < 1)        { toast('Введи количество повторений', true); return; }
  if (isNaN(kcal) || kcal < 0) { toast('Введи корректные ккал', true); return; }

  const btn = document.getElementById('log-btn');
  btn.disabled = true;
  btn.textContent = 'SUBMITTING...';

  try {
    const r = await fetch('/api/workout', {
      method: 'POST',
      body: apiFd({ token: session.token, reps, kcal, note })
    });
    const data = await r.json();

    if (r.ok) {
      toast(`+${data.xp_gained} XP${data.leveled_up ? ' 🔥 LEVEL UP!' : ''}  ·  LVL ${data.lvl}`);
      if (data.leveled_up) document.getElementById('s-lvl').classList.add('level-up');
      setTimeout(() => document.getElementById('s-lvl').classList.remove('level-up'), 1000);
      document.getElementById('w-reps').value = '';
      document.getElementById('w-kcal').value = '';
      document.getElementById('w-note').value = '';
      await refreshMe();
    } else {
      toast(data.detail || 'Ошибка', true);
    }
  } catch {
    toast('Ошибка связи', true);
  } finally {
    btn.disabled = false;
    btn.textContent = 'SUBMIT WORKOUT';
  }
}

// ──────────────────────────────────────────
//  HISTORY
// ──────────────────────────────────────────
async function loadHistory() {
  const el = document.getElementById('history-list');
  el.innerHTML = '<div class="empty-state">Загрузка...</div>';
  try {
    const r = await fetch('/api/workouts?token=' + session.token);
    const data = await r.json();

    if (!data.workouts || !data.workouts.length) {
      el.innerHTML = '<div class="empty-state">Тренировок пока нет. Вперёд!</div>';
      return;
    }
    el.innerHTML = data.workouts.map((w, i) => `
      <div class="history-item" style="animation-delay:${i * 0.05}s">
        <div>
          <div style="font-size:13px; font-weight:700;">${w.note || 'Тренировка'}</div>
          <div class="history-meta">${w.reps} REPS · ${w.kcal} KCAL · ${w.created_at.slice(0,16).replace('T',' ')}</div>
        </div>
        <div class="history-xp">+${w.xp_gained} XP</div>
      </div>
    `).join('');
  } catch {
    el.innerHTML = '<div class="empty-state" style="color:var(--accent2)">Ошибка загрузки</div>';
  }
}

// ──────────────────────────────────────────
//  LEADERBOARD
// ──────────────────────────────────────────
async function loadLeaderboard() {
  const el = document.getElementById('leaderboard-list');
  el.innerHTML = '<div class="empty-state">Загрузка...</div>';
  try {
    const r = await fetch('/api/leaderboard');
    const data = await r.json();

    const myName = session.data?.username?.toLowerCase() ?? '';
    const rankClass = i => i === 0 ? 'gold' : i === 1 ? 'silver' : i === 2 ? 'bronze' : '';

    el.innerHTML = data.leaderboard.map((u, i) => `
      <div class="lb-item ${u.username.toLowerCase() === myName ? 'lb-me' : ''}" style="animation-delay:${i * 0.04}s">
        <div class="lb-rank ${rankClass(i)}">${i + 1}</div>
        <div class="lb-name">${u.username.toUpperCase()} ${u.username.toLowerCase() === myName ? '← YOU' : ''}</div>
        <div>
          <div class="lb-xp">${u.xp} XP</div>
          <div style="font-family:'Space Mono'; font-size:9px; color:var(--muted); text-align:right;">LVL ${u.lvl}</div>
        </div>
      </div>
    `).join('');
  } catch {
    el.innerHTML = '<div class="empty-state" style="color:var(--accent2)">Ошибка загрузки</div>';
  }
}
</script>
