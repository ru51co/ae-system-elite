<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>AE SYSTEM | TACTICAL MAP</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root { --neon: #00ccff; --bg: #050508; }
    body { background: var(--bg); color: #fff; font-family: 'Space Mono', monospace; margin: 0; overflow: hidden; }
    #map { height: 100vh; width: 100vw; position: absolute; z-index: 0; filter: contrast(1.2) brightness(0.6) grayscale(0.7) invert(0.05); }
    .hud-panel { background: rgba(5, 10, 15, 0.8); border: 1px solid rgba(0, 204, 255, 0.2); backdrop-filter: blur(10px); pointer-events: auto; }
    .neon-text { color: var(--neon); text-shadow: 0 0 10px rgba(0, 204, 255, 0.5); }
    .leaflet-popup-content-wrapper { background: #0a0a14; color: #fff; border: 1px solid var(--neon); font-family: 'Space Mono'; }
    .leaflet-popup-tip { background: var(--neon); }
    /* Сетка поверх карты */
    .map-grid { position: absolute; inset: 0; pointer-events: none; z-index: 5; background-image: linear-gradient(rgba(0, 204, 255, 0.05) 1px, transparent 1px), linear-gradient(90deg, rgba(0, 204, 255, 0.05) 1px, transparent 1px); background-size: 50px 50px; }
  </style>
</head>
<body>

<div id="map"></div>
<div class="map-grid"></div>

<div class="absolute top-0 left-0 w-full z-10 p-4 flex justify-between items-start pointer-events-none">
  <div class="hud-panel p-3 rounded-lg border-l-4 border-l-cyan-500">
    <div class="text-[9px] text-cyan-600 uppercase font-bold tracking-widest leading-none">Global Positioning</div>
    <div class="text-sm font-bold neon-text" id="coords">WAITING GPS...</div>
  </div>
  <div class="hud-panel p-3 rounded-lg text-right border-r-4 border-r-cyan-500">
    <div class="text-xs font-bold uppercase" id="user-display">AGENT: BRATAN</div>
    <div class="text-[9px] text-cyan-600">SYSTEM STATUS: NOMINAL</div>
  </div>
</div>

<div class="absolute top-24 left-4 z-10 space-y-2 pointer-events-none">
  <div class="hud-panel p-2 rounded-md w-24 border-l border-cyan-500/30">
    <div class="text-[8px] text-cyan-700 uppercase">Pulse</div>
    <div class="text-xs font-bold" id="pulse">72 <small>BPM</small></div>
  </div>
  <div class="hud-panel p-2 rounded-md w-24 border-l border-cyan-500/30 text-yellow-500">
    <div class="text-[8px] uppercase opacity-60">Kcal</div>
    <div class="text-xs font-bold" id="kcal-display">450</div>
  </div>
</div>

<div class="absolute bottom-8 left-0 w-full z-10 flex justify-center items-center pointer-events-none px-6">
  <div class="flex gap-4 items-center">
    <button onclick="map.locate({setView: true})" class="hud-panel p-4 rounded-full active:scale-90 transition-all border-cyan-500/50">📍</button>
    
    <div class="hud-panel px-6 py-3 rounded-2xl flex flex-col items-center border-t-2 border-cyan-400">
      <div class="text-[8px] text-cyan-500 uppercase font-bold mb-1">Add Node</div>
      <div class="text-[10px] text-gray-400">TAP ON MAP</div>
    </div>

    <button onclick="alert('SCANNER ACTIVE: Point at food')" class="hud-panel p-4 rounded-full active:scale-90 transition-all border-yellow-500/50">📸</button>
  </div>
</div>

<script>
  // --- Карта ---
  const map = L.map('map', { zoomControl: false, attributionControl: false }).setView([55.75, 37.61], 13);
  
  // Темный слой "CartoDB Dark Matter" идеально подходит под стиль
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

  // Кастомная иконка узла
  const nodeIcon = L.divIcon({
    className: 'custom-div-icon',
    html: "<div style='background-color:#00ccff; width:12px; height:12px; border-radius:50%; box-shadow:0 0 10px #00ccff; border:2px solid #fff;'></div>",
    iconSize: [12, 12],
    iconAnchor: [6, 6]
  });

  // Массив для хранения узлов (в идеале нужно слать на твой /api/workout или создать новый эндпоинт)
  let nodes = JSON.parse(localStorage.getItem('ae_nodes') || '[]');

  function renderNodes() {
    nodes.forEach(node => {
      L.marker(node.coords, {icon: nodeIcon}).addTo(map)
        .bindPopup(`<b>УЗЕЛ: ${node.name}</b><br><small>STATUS: SECURE</small>`);
    });
  }
  renderNodes();

  // Добавление узла по клику
  map.on('click', function(e) {
    const nodeName = prompt("Введите название узла (напр. Точка сбора):");
    if (nodeName) {
      const newNode = {
        name: nodeName,
        coords: [e.latlng.lat, e.latlng.lng],
        time: new Date().toISOString()
      };
      nodes.push(newNode);
      localStorage.setItem('ae_nodes', JSON.stringify(nodes));
      
      L.marker(newNode.coords, {icon: nodeIcon}).addTo(map)
        .bindPopup(`<b>УЗЕЛ: ${newNode.name}</b><br><small>CREATED: JUST NOW</small>`)
        .openPopup();
    }
  });

  // GPS мониторинг
  map.locate({setView: true, watch: true});
  map.on('locationfound', e => {
    document.getElementById('coords').innerText = `${e.latlng.lat.toFixed(4)} N, ${e.latlng.lng.toFixed(4)} E`;
    L.circle(e.latlng, {radius: 20, color: '#00ccff', weight: 1, fillOpacity: 0.1}).addTo(map);
  });

  // Симуляция пульса
  setInterval(() => {
    document.getElementById('pulse').innerHTML = `${70 + Math.floor(Math.random() * 8)} <small>BPM</small>`;
  }, 3000);
</script>

</body>
</html>
