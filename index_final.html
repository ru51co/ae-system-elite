<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AE SYSTEM | ELITE ORDER</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #050508; --bg2: #0a0a14; --accent: #00ccff; --glow: rgba(0,204,255,.4); --border: rgba(0,204,255,.15); --muted: #4a5568; }
        body { background: var(--bg); color: #fff; font-family: 'Syne', sans-serif; min-height: 100dvh; display: flex; align-items: center; justify-content: center; margin: 0; }
        .auth-card { width: 100%; max-width: 340px; background: var(--bg2); border: 1px solid var(--border); border-radius: 20px; padding: 30px; text-align: center; box-shadow: 0 0 40px rgba(0,204,255,.08); }
        .auth-logo-img { max-width: 150px; margin-bottom: 20px; filter: drop-shadow(0 0 10px var(--glow)); }
        .auth-input { width: 100%; padding: 12px; margin-bottom: 10px; background: #111120; border: 1px solid var(--border); color: #fff; border-radius: 10px; outline: none; }
        .auth-btn { width: 100%; padding: 14px; background: var(--accent); border: none; border-radius: 11px; font-weight: 800; cursor: pointer; text-transform: uppercase; }
        .auth-error { font-family: 'Space Mono', monospace; font-size: 11px; color: var(--accent); margin-top: 15px; min-height: 1.2em; }
        .auth-toggle { font-size: 10px; color: var(--muted); margin-top: 15px; cursor: pointer; }
    </style>
</head>
<body>

<div id="auth-overlay">
    <div class="auth-card">
        <img src="https://i.ibb.co/VYvXf7V/assassin-energy-logo.png" alt="AE LOGO" class="auth-logo-img">
        <div style="letter-spacing: 2px; color: var(--accent); margin-bottom: 20px; font-size: 14px;">AE_SYSTEM.INIT</div>
        
        <input class="auth-input" id="user-in" placeholder="IDENTIFIER">
        <input class="auth-input" id="pass-in" type="password" placeholder="PASSKEY">
        <button class="auth-btn" onclick="handleAuth()" id="auth-btn-el">ENTER SYSTEM</button>
        
        <div class="auth-error" id="auth-error"></div>
        <div class="auth-toggle" id="auth-toggle-el" onclick="toggleMode()">Новый агент? Регистрация →</div>
    </div>
</div>

<script>
    let isReg = false;
    function toggleMode() {
        isReg = !isReg;
        document.getElementById('auth-btn-el').innerText = isReg ? 'CREATE AGENT' : 'ENTER SYSTEM';
        document.getElementById('auth-toggle-el').innerText = isReg ? 'Уже есть аккаунт? Войти →' : 'Новый агент? Регистрация →';
    }

    async function handleAuth() {
        const u = document.getElementById('user-in').value;
        const p = document.getElementById('pass-in').value;
        const msg = document.getElementById('auth-error');
        const url = isReg ? '/api/register' : '/api/login';
        
        const formData = new FormData();
        formData.append('username', u);
        formData.append('password', p);

        try {
            const r = await fetch(url, { method: 'POST', body: formData });
            const data = await r.json();

            if (r.ok) {
                // ИСПРАВЛЕНИЕ: Берем текст из ключа message или status
                msg.innerText = isReg ? "Агент успешно создан!" : "Доступ разрешен. Вход...";
                if (!isReg && data.token) {
                    setTimeout(() => { location.reload(); }, 1000);
                }
            } else {
                msg.innerText = data.detail || "Ошибка протокола";
            }
        } catch (e) {
            msg.innerText = "Связь прервана";
        }
    }
</script>
</body>
</html>
