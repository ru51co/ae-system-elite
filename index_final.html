<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AE PREMIUM APP</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono&family=Syne:wght@800&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #050508; --accent: #00ccff; --gold: #ffd700; --card-bg: #0a0a14; }
        body { background: var(--bg); color: #fff; font-family: 'Syne', sans-serif; margin: 0; padding-bottom: 80px; }
        .card { background: var(--card-bg); border: 1px solid rgba(0,204,255,0.15); padding: 20px; border-radius: 20px; margin: 15px; }
        #map { height: 400px; border-radius: 20px; border: 1px solid var(--accent); margin: 15px; z-index: 1; }
        .view { display: none; }
        .view.active { display: block; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        button { width: calc(100% - 30px); margin: 15px; padding: 18px; background: var(--accent); border: none; border-radius: 15px; font-weight: 900; color: #000; cursor: pointer; text-transform: uppercase; }
        .nav { position: fixed; bottom: 0; width: 100%; display: flex; background: rgba(0,0,0,0.95); border-top: 1px solid rgba(255,255,255,0.1); z-index: 1000; }
        .nav-item { flex: 1; padding: 20px; text-align: center; font-size: 10px; color: #444; font-family: 'Space Mono'; }
        .nav-item.active { color: var(--accent); }
        #auth-overlay { position: fixed; inset: 0; background: var(--bg); z-index: 2000; display: flex; align-items: center; justify-content: center; }
        input { width: 100%; padding: 15px; margin-bottom: 10px; background: #111; border: 1px solid #333; color: #fff; border-radius: 10px; box-sizing: border-box; }
    </style>
</head>
<body>

<div id="auth-overlay">
    <div class="card" style="width: 85%; max-width: 350px;">
        <h2 style="color:var(--accent); text-align:center;">SYSTEM_AUTH</h2>
        <input type="text" id="u" placeholder="USERNAME">
        <input type="password" id="p" placeholder="PASSKEY">
        <button onclick="handleLogin()" style="width:100%; margin: 10px 0;">INITIATE</button>
    </div>
</div>

<div class="view active" id="v-train">
    <div class="card">
        <div style="display:flex; justify-content: space-between;">
            <span id="rank" style="color:var(--accent)">RANK 1</span>
            <span id="balance" style="color:var(--gold)">$AE 0.0</span>
        </div>
        <h1 id="reps-total" style="font-size: 48px; margin: 10px 0;">0</h1>
        <p style="font-size: 10px; opacity: 0.5;">REPS COMPLETED</p>
    </div>
    <button onclick="addRep()">EXECUTE REP +1</button>
</div>

<div class="view" id="v-map">
    <div id="weather" style="text-align: center; color: var(--accent); padding-top: 15px; font-size: 12px;">WEATHER: SCANNING...</div>
    <div id="map"></div>
    <p style="text-align: center; font-size: 10px; opacity: 0.5;">SOCKET LOCATIONS LOADED</p>
</div>

<nav class="nav">
    <div class="nav-item active" onclick="switchV('train')">TRAIN</div>
    <div class="nav-item" onclick="switchV('map')">MAPS</div>
</nav>

<script>
    let state = { username: '', reps: 0, xp: 0, lvl: 1, balance: 0, kcal: 0 };
    let map;

    async function handleLogin() {
        const user = document.getElementById('u').value;
        const pass = document.getElementById('p').value;
        if(!user || !pass) return alert("ENTER DATA");

        const res = await fetch('/api/login', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({username: user, password: pass})
        });
        const r = await res.json();
        state.username = user;
        if(r.data) Object.assign(state, r.data);
        document.getElementById('auth-overlay').style.display = 'none';
        updateUI();
    }

    function addRep() {
        state.reps++;
        state.xp += 15;
        if(state.xp >= state.lvl * 200) { state.lvl++; state.xp = 0; }
        state.balance = (state.reps * 0.1).toFixed(1);
        updateUI();
        sync();
    }

    async function sync() {
        try {
            await fetch('/api/sync', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(state)
            });
        } catch(e) { console.error("Sync failed"); }
    }

    function updateUI() {
        document.getElementById('rank').innerText = `RANK ${state.lvl}`;
        document.getElementById('balance').innerText = `$AE ${state.balance}`;
        document.getElementById('reps-total').innerText = state.reps;
    }

    function initMap() {
        if(map) return;
        map = L.map('map').setView([55.75, 37.61], 13);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);
        
        navigator.geolocation.getCurrentPosition(pos => {
            const {latitude, longitude} = pos.coords;
            map.setView([latitude, longitude], 15);
            L.circle([latitude, longitude], {color: '#00ccff', radius: 100}).addTo(map).bindPopup("YOU");
            fetchWeather(latitude, longitude);
        });
    }

    async function fetchWeather(lat, lon) {
        const res = await fetch(`/api/weather?lat=${lat}&lon=${lon}`);
        const data = await res.json();
        document.getElementById('weather').innerText = `TEMP: ${data.temp}°C | STATUS: ${data.condition}`;
    }

    function switchV(v) {
        document.querySelectorAll('.view').forEach(x => x.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(x => x.classList.remove('active'));
        document.getElementById('v-'+v).classList.add('active');
        event.currentTarget.classList.add('active');
        if(v === 'map') setTimeout(initMap, 200);
    }
</script>
</body>
</html>
